name: Deploy demo to GitHub Pages

on:
  push:
    branches: [ main ]

# Grant the workflow the minimal write permissions it needs so the
# gh-pages action can push the built site. Without this the default
# GITHUB_TOKEN may be read-only and pushes will fail with 403.
permissions:
  contents: write
  pages: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # ensure the checked-out repo retains credentials so subsequent
          # git push operations use the provided GITHUB_TOKEN
          persist-credentials: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install demo dependencies
        working-directory: ./test
        run: |
          # Use npm ci when a lockfile exists for deterministic install,
          # otherwise fall back to npm install so the workflow doesn't fail.
          if [ -f package-lock.json ] || [ -f npm-shrinkwrap.json ]; then
            npm ci
          else
            npm install
          fi

      - name: Prepare public folder
        run: |
          rm -rf public
          mkdir public
          # Copy demo files
          cp -r test/* public/
          # Include the repository README so the demo can load it at ./README.md
          cp README.md public/README.md || true
          # Ensure jsoneditor dist files are copied so the demo is self-contained
          mkdir -p public/node_modules/jsoneditor/dist
          cp test/node_modules/jsoneditor/dist/jsoneditor.min.js public/node_modules/jsoneditor/dist/
          cp test/node_modules/jsoneditor/dist/jsoneditor.min.css public/node_modules/jsoneditor/dist/
          # Add nojekyll to avoid GitHub Pages treating files as Jekyll
          touch public/.nojekyll

      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public
